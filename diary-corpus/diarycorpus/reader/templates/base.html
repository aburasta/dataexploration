<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Diary Corpus{% endblock %}</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: Georgia, 'Times New Roman', serif; max-width: 820px;
           margin: 0 auto; padding: 1.5rem; line-height: 1.55; }
    header { border-bottom: 1px solid #8884; padding-bottom: .6rem; margin-bottom: 1.2rem;
             display: flex; gap: 1rem; align-items: baseline; flex-wrap: wrap; }
    header h1 { font-size: 1.25rem; margin: 0; }
    header a { text-decoration: none; }
    nav a { margin-right: 1rem; }
    form.search { margin-left: auto; }
    input[type=search] { padding: .35rem .5rem; font-size: 1rem; min-width: 12rem; }
    button { padding: .35rem .7rem; font-size: 1rem; cursor: pointer; }
    .muted { color: #8889; font-size: .9rem; }
    ul.works { list-style: none; padding: 0; }
    ul.works li { padding: .5rem 0; border-bottom: 1px solid #8882; }
    .entry { margin: 1.4rem 0; }
    .entry .date { font-weight: bold; }
    .entry .body { white-space: pre-wrap; font-size: .98rem; }
    mark, .snippet b { background: #ffd54f66; }
    .snippet { white-space: pre-wrap; }
    .result { padding: .6rem 0; border-bottom: 1px solid #8882; }
    code { background: #8881; padding: 0 .3rem; border-radius: 3px; }
  </style>
</head>
<body>
  <header>
    <h1><a href="/">📔 Diary Corpus</a></h1>
    <nav><a href="/">Works</a></nav>
    <form class="search" action="/search" method="get" role="search">
      <input type="search" name="q" placeholder="full-text search…"
             value="{{ query|default('') }}">
      <button type="submit">Search</button>
    </form>
  </header>
  {% block content %}{% endblock %}
</body>
</html>
