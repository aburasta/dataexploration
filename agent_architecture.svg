<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1820" viewBox="0 0 1500 1820" font-family="Helvetica,Arial,sans-serif">
<rect width="1500" height="1820" fill="#0f1117"/>
<defs>
<marker id="arr" markerWidth="12" markerHeight="12" refX="9" refY="5" orient="auto">
  <path d="M0,0 L10,5 L0,10 z" fill="#7aa2f7"/>
</marker>
<marker id="arrg" markerWidth="12" markerHeight="12" refX="9" refY="5" orient="auto">
  <path d="M0,0 L10,5 L0,10 z" fill="#9ece6a"/>
</marker>
</defs>
<text x="750" y="56" fill="#ffffff" font-size="34" font-weight="bold" text-anchor="middle">THE COUP-TO-DOCUMENTARY AGENT</text>
<text x="750" y="88" fill="#9aa5ce" font-size="17" text-anchor="middle">Pipeline built so far &#8212; raw coup data &#8594; research &#8594; script &#8594; footage-ready shot list</text>
<rect x="150" y="110" rx="14" ry="14" width="760" height="70" fill="#1b2335" stroke="#3b4a6b" stroke-width="2.5"/>
<text x="172" y="144" fill="#ffffff" font-size="20" font-weight="bold">INPUT  —  user request</text>
<text x="172" y="170" fill="#c8d0f0" font-size="14.5">“African coups d’état — successful vs. unsuccessful”</text>
<line x1="530.0" y1="180" x2="530.0" y2="226" stroke="#7aa2f7" stroke-width="3" marker-end="url(#arr)"/>
<rect x="150" y="230" rx="14" ry="14" width="760" height="96" fill="#13261b" stroke="#2f6d3f" stroke-width="2.5"/>
<text x="172" y="264" fill="#ffffff" font-size="20" font-weight="bold">NODE 1  ·  Coup Dataset</text>
<text x="172" y="290" fill="#c8d0f0" font-size="14.5">Compile African coups 1950–present; classify by outcome.</text>
<text x="172" y="312" fill="#c8d0f0" font-size="14.5">→ african_coups_1950_present.xlsx  (tabs: All / Successful / Unsuccessful)</text>
<rect x="780" y="244" rx="10" ry="10" width="116" height="26" fill="#9ece6a"/>
<text x="838.0" y="262" fill="#0f1117" font-size="13" font-weight="bold" text-anchor="middle">BUILT</text>
<line x1="530.0" y1="326" x2="530.0" y2="356" stroke="#7aa2f7" stroke-width="3" marker-end="url(#arr)"/>
<rect x="150" y="360" rx="14" ry="14" width="760" height="96" fill="#13261b" stroke="#2f6d3f" stroke-width="2.5"/>
<text x="172" y="394" fill="#ffffff" font-size="20" font-weight="bold">NODE 2  ·  Extract Unsuccessful</text>
<text x="172" y="420" fill="#c8d0f0" font-size="14.5">Pull the unsuccessful coups into their own sheet.</text>
<text x="172" y="442" fill="#c8d0f0" font-size="14.5">→ african_coups_unsuccessful.xlsx</text>
<rect x="780" y="374" rx="10" ry="10" width="116" height="26" fill="#9ece6a"/>
<text x="838.0" y="392" fill="#0f1117" font-size="13" font-weight="bold" text-anchor="middle">BUILT</text>
<line x1="530.0" y1="456" x2="530.0" y2="486" stroke="#7aa2f7" stroke-width="3" marker-end="url(#arr)"/>
<text x="544.0" y="478" fill="#9aa5ce" font-size="13" font-style="italic">user picks: the 2004 Wonga Coup</text>
<rect x="150" y="490" rx="14" ry="14" width="760" height="150" fill="#13261b" stroke="#2f6d3f" stroke-width="2.5"/>
<text x="172" y="524" fill="#ffffff" font-size="20" font-weight="bold">NODE 3  ·  Deep-Research Dossier</text>
<text x="172" y="550" fill="#c8d0f0" font-size="14.5">5 parallel research agents → cross-check → tag [FACT]/[ALLEGED]/[DISPUTED].</text>
<text x="172" y="572" fill="#c8d0f0" font-size="14.5">Characters · oil/motive · colonial history · the plot · the failure.</text>
<text x="172" y="594" fill="#c8d0f0" font-size="14.5">→ wonga_coup_dossier.md  +  .docx  (sourced bibliography)</text>
<rect x="780" y="504" rx="10" ry="10" width="116" height="26" fill="#9ece6a"/>
<text x="838.0" y="522" fill="#0f1117" font-size="13" font-weight="bold" text-anchor="middle">BUILT</text>
<line x1="530.0" y1="640" x2="530.0" y2="670" stroke="#7aa2f7" stroke-width="3" marker-end="url(#arr)"/>
<rect x="150" y="674" rx="14" ry="14" width="760" height="168" fill="#13261b" stroke="#2f6d3f" stroke-width="2.5"/>
<text x="172" y="708" fill="#ffffff" font-size="20" font-weight="bold">NODE 4  ·  Narration / Voiceover</text>
<text x="172" y="734" fill="#c8d0f0" font-size="14.5">Persona: showrunner + director + continuity + narration writer.</text>
<text x="172" y="756" fill="#c8d0f0" font-size="14.5">Structure: COLD OPEN → context → continuation (loose, anti-cringe).</text>
<text x="172" y="778" fill="#c8d0f0" font-size="14.5">Accuracy tags inherited. Measures runtime; segments into beats.</text>
<text x="172" y="800" fill="#c8d0f0" font-size="14.5">→ wonga_coup_script.md + .docx   (~13:19, voice = placeholder)</text>
<rect x="780" y="688" rx="10" ry="10" width="116" height="26" fill="#9ece6a"/>
<text x="838.0" y="706" fill="#0f1117" font-size="13" font-weight="bold" text-anchor="middle">BUILT</text>
<line x1="530.0" y1="842" x2="530.0" y2="872" stroke="#7aa2f7" stroke-width="3" marker-end="url(#arr)"/>
<rect x="150" y="876" rx="14" ry="14" width="760" height="196" fill="#13261b" stroke="#2f6d3f" stroke-width="2.5"/>
<text x="172" y="910" fill="#ffffff" font-size="20" font-weight="bold">NODE 5  ·  Footage Sourcing + Timed Shot List</text>
<text x="172" y="936" fill="#c8d0f0" font-size="14.5">3 parallel footage agents: People · The Event · Country/Oil/History.</text>
<text x="172" y="958" fill="#c8d0f0" font-size="14.5">Priority: REAL → public-domain/CC → licensable archive → stock.</text>
<text x="172" y="980" fill="#c8d0f0" font-size="14.5">Compiler maps 193 beats (3–5s each) to one visual + link + licence.</text>
<text x="172" y="1002" fill="#c8d0f0" font-size="14.5">→ wonga_coup_shotlist.md + .docx</text>
<text x="172" y="1024" fill="#c8d0f0" font-size="14.5">   (timecodes, colour-coded asset types, rights flags)</text>
<rect x="780" y="890" rx="10" ry="10" width="116" height="26" fill="#9ece6a"/>
<text x="838.0" y="908" fill="#0f1117" font-size="13" font-weight="bold" text-anchor="middle">BUILT</text>
<line x1="530.0" y1="1072" x2="530.0" y2="1102" stroke="#7aa2f7" stroke-width="3" marker-end="url(#arr)"/>
<rect x="150" y="1106" rx="14" ry="14" width="760" height="84" fill="#1b2335" stroke="#3b4a6b" stroke-width="2.5"/>
<text x="172" y="1140" fill="#ffffff" font-size="20" font-weight="bold">OUTPUT  —  production-ready documentary package</text>
<text x="172" y="1166" fill="#c8d0f0" font-size="14.5">Dossier  +  timed voiceover  +  shot list, committed &amp; pushed to GitHub.</text>
<line x1="530.0" y1="1190" x2="530.0" y2="1226" stroke="#565f89" stroke-width="3" stroke-dasharray="7 6" marker-end="url(#arr)"/>
<rect x="150" y="1226" rx="14" ry="14" width="760" height="74" fill="#2a2030" stroke="#6b4a6b" stroke-width="2.5"/>
<text x="172" y="1260" fill="#ffffff" font-size="20" font-weight="bold">NODE 6  ·  Voice Re-tune (next)</text>
<text x="172" y="1286" fill="#c8d0f0" font-size="14.5">Ingest user writing samples → style bible → re-voice script &amp; shot list.</text>
<rect x="780" y="1240" rx="10" ry="10" width="116" height="26" fill="#7dcfff"/>
<text x="838.0" y="1258" fill="#0f1117" font-size="13" font-weight="bold" text-anchor="middle">PENDING</text>
<text x="1000" y="150" fill="#9aa5ce" font-size="16" font-weight="bold">CROSS-CUTTING</text>
<rect x="1000" y="168" rx="12" width="360" height="106" fill="#241f12" stroke="#6b5a2f" stroke-width="2"/>
<text x="1018" y="196" fill="#ffffff" font-size="16" font-weight="bold">Accuracy spine</text>
<text x="1018" y="220" fill="#c8d0f0" font-size="13">[FACT] / [ALLEGED] / [DISPUTED]</text>
<text x="1018" y="242" fill="#c8d0f0" font-size="13">tags propagate node → node.</text>
<text x="1018" y="264" fill="#c8d0f0" font-size="13">Allegations never stated as fact.</text>
<rect x="1000" y="298" rx="12" width="360" height="106" fill="#1a2230" stroke="#3b5a7b" stroke-width="2"/>
<text x="1018" y="326" fill="#ffffff" font-size="16" font-weight="bold">Multi-agent engine</text>
<text x="1018" y="350" fill="#c8d0f0" font-size="13">Fan-out research agents (5 + 3),</text>
<text x="1018" y="372" fill="#c8d0f0" font-size="13">then a compiler agent merges</text>
<text x="1018" y="394" fill="#c8d0f0" font-size="13">results into the deliverable.</text>
<rect x="1000" y="428" rx="12" width="360" height="106" fill="#1a2230" stroke="#3b5a7b" stroke-width="2"/>
<text x="1018" y="456" fill="#ffffff" font-size="16" font-weight="bold">Doc rendering</text>
<text x="1018" y="480" fill="#c8d0f0" font-size="13">md_to_docx.py  +  generators</text>
<text x="1018" y="502" fill="#c8d0f0" font-size="13">→ styled Word (.docx) output.</text>
<text x="1018" y="524" fill="#c8d0f0" font-size="13">Tables, headings, colour tags.</text>
<rect x="1000" y="558" rx="12" width="360" height="106" fill="#1a2230" stroke="#3b5a7b" stroke-width="2"/>
<text x="1018" y="586" fill="#ffffff" font-size="16" font-weight="bold">Footage rules</text>
<text x="1018" y="610" fill="#c8d0f0" font-size="13">Real → CC → archive → stock.</text>
<text x="1018" y="632" fill="#c8d0f0" font-size="13">Links = map, not cleared rights.</text>
<text x="1018" y="654" fill="#c8d0f0" font-size="13">Gaps flagged (note, Calil).</text>
<rect x="1000" y="688" rx="12" width="360" height="106" fill="#1a2230" stroke="#3b5a7b" stroke-width="2"/>
<text x="1018" y="716" fill="#ffffff" font-size="16" font-weight="bold">Version control</text>
<text x="1018" y="740" fill="#c8d0f0" font-size="13">Every artifact committed &amp;</text>
<text x="1018" y="762" fill="#c8d0f0" font-size="13">pushed to branch on GitHub.</text>
<text x="1018" y="784" fill="#c8d0f0" font-size="13">Reproducible generators.</text>
<rect x="1000" y="818" rx="12" width="360" height="106" fill="#2a1a1a" stroke="#6b3b3b" stroke-width="2"/>
<text x="1018" y="846" fill="#ffffff" font-size="16" font-weight="bold">Known limits</text>
<text x="1018" y="870" fill="#c8d0f0" font-size="13">Sandbox blocks downloads;</text>
<text x="1018" y="892" fill="#c8d0f0" font-size="13">no live video pull / no Google</text>
<text x="1018" y="914" fill="#c8d0f0" font-size="13">Sheets — files import instead.</text>
<text x="1000" y="1340" fill="#9aa5ce" font-size="14" font-weight="bold">STATUS</text>
<rect x="1000" y="1350" rx="7" width="20" height="20" fill="#9ece6a"/>
<text x="1030" y="1366" fill="#c8d0f0" font-size="14">BUILT</text>
<rect x="1000" y="1380" rx="7" width="20" height="20" fill="#e0af68"/>
<text x="1030" y="1396" fill="#c8d0f0" font-size="14">IN PROGRESS</text>
<rect x="1000" y="1410" rx="7" width="20" height="20" fill="#7dcfff"/>
<text x="1030" y="1426" fill="#c8d0f0" font-size="14">PENDING</text>
<text x="150" y="1790" fill="#565f89" font-size="13">Case study threaded through: the 2004 Wonga Coup (Equatorial Guinea).  Each node consumes the previous node’s output.</text>
</svg>